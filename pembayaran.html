<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gacoan Favorit</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f8ff;
            display: flex;
            margin: 0;
        }

        /* Sidebar */
        .sidebar {
            width: 200px;
            background-color: #1e90ff;
            color: white;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            padding-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            display: block;
            border-radius: 8px;
            transition: background-color 0.2s;
        }

        .sidebar a:hover {
            background-color: #4682b4;
        }

        /* Konten utama */
        .main-content {
            margin-left: 220px; /* sesuaikan dengan lebar sidebar + padding */
            padding: 20px;
            flex: 1;
        }

        h1 {
            color: #1e90ff;
            margin-bottom: 20px;
        }

        .gacoan-card {
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            width: 300px;
            margin-bottom: 20px;
            text-align: center;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .gacoan-card:hover {
            transform: scale(1.05);
        }

        .gacoan-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .gacoan-card h2 {
            margin: 10px 0;
            color: #333;
        }

        .gacoan-card p {
            padding: 0 10px 10px 10px;
            color: #666;
        }

        .gacoan-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                flex-direction: row;
                flex-wrap: wrap;
            }

            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <a href="#gacoan1">Gacoan 1</a>
        <a href="#gacoan2">Gacoan 2</a>
        <a href="#gacoan3">Gacoan 3</a>
    </div>

    <div class="main-content">
        <h1>Gacoan Favoritku</h1>

        <div class="gacoan-list">
            <div class="gacoan-card" id="gacoan1">
                <img src="https://placekitten.com/300/200" alt="Gacoan 1">
                <h2>Gacoan 1</h2>
                <p>Ini adalah gacoan pertama yang paling aku suka karena lucu dan menggemaskan.</p>
            </div>

            <div class="gacoan-card" id="gacoan2">
                <img src="https://placekitten.com/301/200" alt="Gacoan 2">
                <h2>Gacoan 2</h2>
                <p>Gacoan kedua ini punya warna yang unik dan menarik perhatian.</p>
            </div>

            <div class="gacoan-card" id="gacoan3">
                <img src="https://placekitten.com/302/200" alt="Gacoan 3">
                <h2>Gacoan 3</h2>
                <p>Gacoan ini jago banget kalau sedang bermain dan lucunya nggak ketulungan.</p>
            </div>
        </div>
    </div>
</body>
</html>
